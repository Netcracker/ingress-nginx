name: Release
run-name: 'Release controller image and helm chart for version ${{ inputs.controller-version }}'

on:
  workflow_dispatch:
    inputs:
      controller-version:
        description: 'The version to be used for the controller image (SemVer: vX.Y.Z).'
        required: true
        default: ''
        type: string
      chart-version:
        description: 'The version to be used for the helm chart (SemVer: X.Y.Z).'
        required: true
        default: ''
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ inputs.controller-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          fetch-tags: true

      - name: Check if tag exists
        run: |
          if git rev-parse "refs/tags/controller-${TAG}" >/dev/null 2>&1; then
            summary="Error: Github release tag controller-${TAG} already exists. This release build will fail to push images. Please delete the tag or choose a different version."
            echo "$summary"
            echo "$summary" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  build-controllers-images:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    needs: [prepare]
    outputs:
      controller_digest: ${{ steps.set-digests.outputs.controller_digest }}
      controller_chroot_digest: ${{ steps.set-digests.outputs.controller_chroot_digest }}
    env:
      TAG: ${{ inputs.controller-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - name: Get go version
        run: echo "GOLANG_VERSION=$(cat GOLANG_VERSION)" >> $GITHUB_ENV

      - name: Set up Go
        id: go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          check-latest: true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: latest
          platforms: linux/amd64,linux/arm,linux/arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build-images
        run: |
          make TAG=${{ env.TAG }} REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ingress-nginx release
      - name: Upload metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-metadata
          path: '*-metadata.json'
      - name: Set output digests
        id: set-digests
        run: |
          echo "controller_digest=$(jq -r '."containerimage.digest"' ingress-nginx-metadata.json)" >> $GITHUB_OUTPUT
          echo "controller_chroot_digest=$(jq -r '."containerimage.digest"' ingress-nginx-chroot-metadata.json)" >> $GITHUB_OUTPUT
      - name: Create release-${{ inputs.controller-version }} branch
        run: |
          ### Edit the semver tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${TAG}" > TAG
          git add TAG
          git commit -m "release: Set controller image tag to ${TAG}" || true
          git push
      - name: Create release controller-${{ env.TAG }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create controller-${{ env.TAG }} \
            --target ${{ github.ref }} \
            --title "controller-${{ env.TAG }}" \
            --draft=false \
            --latest=true \
            --notes "controller-${{ env.TAG }}.

          ## Docker images

          \`\`\`
          ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ingress-nginx/controller:${{ env.TAG }}@${{ steps.set-digests.outputs.controller_digest }}
          \`\`\`
          \`\`\`
          ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ingress-nginx/controller-chroot:${{ env.TAG }}@${{ steps.set-digests.outputs.controller_chroot_digest }}
          \`\`\`
          "

  release-helm-chart:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [prepare, build-controllers-images]
    env:
      TAG: ${{ inputs.controller-version }}
      CONTROLLER_DIGEST: ${{ needs.build-controllers-images.outputs.controller_digest }}
      CONTROLLER_CHROOT_DIGEST: ${{ needs.build-controllers-images.outputs.controller_chroot_digest }}
      CHART_VERSION: ${{ inputs.chart-version }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - name: Set up Helm Docs
        uses: gabe565/setup-helm-docs-action@d5c35bdc9133cfbea3b671acadf50a29029e87c2 # v1.0.4
      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v4.1.1
      - name: Set up Helm Chart Testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f
      - name: Setup kustomize
        uses: imranismail/setup-kustomize@53f941b41dca13ed61874bbc6b4b6e1562877530 # v3.0.0
        with:
            kustomize-version: 4.5.4
      - name: Set up Artifact Hub
        run: |
          curl --fail --location https://github.com/artifacthub/hub/releases/download/v1.20.0/ah_1.20.0_linux_amd64.tar.gz --output /tmp/ah.tar.gz
          echo "9027626f19ff9f3ac668f222917130ac885e289e922e1428bfd2e7f066324e31  /tmp/ah.tar.gz" | shasum --check
          sudo tar --extract --file /tmp/ah.tar.gz --directory /usr/local/bin ah
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 0
      - name: Prepare helm chart for release
        run: |
          # Update the helm chart version and appVersion to match the image tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull

          if [[ -n '${CHART_VERSION}' ]]; then
            yq eval -i '.version = "${{ env.CHART_VERSION }}"' charts/ingress-nginx/Chart.yaml
          fi
          yq eval -i '.appVersion = "${{ env.TAG }}"' charts/ingress-nginx/Chart.yaml
          # Update the helm chart values.yaml to use the image with the digest
          yq eval -i '.controller.image.digest = "${{ env.CONTROLLER_DIGEST }}" | .controller.image.digestChroot = "${{ env.CONTROLLER_CHROOT_DIGEST }}" | .controller.image.tag = "${{ env.TAG }}"' charts/ingress-nginx/values.yaml
          # Generate the README.md for chart
          helm-docs --chart-search-root charts
          # Edit the static manifests
          chmod +x hack/generate-deploy-scripts.sh
          hack/generate-deploy-scripts.sh
          # Add changes to git and push
          git add .
          git commit -m "release: Update helm chart version to ${CHART_VERSION}" || true
          git push
      - name: Lint chart
        run: |
          ct lint --config .ct.yaml
          ah lint --path charts/ingress-nginx

      - name: Release chart
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_RELEASE_NAME_TEMPLATE: helm-chart-{{ .Version }}
          CR_SKIP_EXISTING: true
        with:
          charts_dir: charts
