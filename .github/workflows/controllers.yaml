name: Controller Build

on:
  pull_request:
    branches:
      - "*"
    paths:
      - 'rootfs/**'

  push:
    branches:
      - main
    paths:
      - 'rootfs/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Whether to build and push release images (controller and controller-chroot) or just build images without pushing. This input is ignored when the workflow is triggered by a push or schedule event. Default: false'
        required: false
        default: false
        type: boolean
      controller-version:
        description: 'The version to be used for the controller image (SemVer: vX.Y.Z). This input is ignored when the workflow is triggered by a push or schedule event. Default: the value of the TAG file'
        required: false
        default: ''
        type: string
      chart-version:
        description: 'The version to be used for the helm chart (SemVer: X.Y.Z). This input is ignored when the workflow is triggered by a push or schedule event. Default: the value in charts/ingress-nginx/Chart.yaml'
        required: false
        default: ''
        type: string
  schedule:
    - cron: "0 3 * * 0"

jobs:
  changes:
    permissions:
      contents: read  # for dorny/paths-filter to fetch a list of changed files
      pull-requests: read  # for dorny/paths-filter to read pull requests
    runs-on: ubuntu-latest
    outputs:
      controller: ${{ steps.filter.outputs.rootfs }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            rootfs:
              - 'rootfs/**'
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.TAG }}
      push: ${{ steps.push-flag.outputs.PUSH }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          fetch-tags: true
      - name: Setup tag
        id: tag
        run: |
          TAG="$(cat TAG)"
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            if [[ -n '${{ github.event.inputs.controller-version }}' ]]; then
              TAG="${{ github.event.inputs.controller-version }}"
            fi
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "TAG=$TAG"
      - name: Set push flag
        id: push-flag
        run: |
          PUSH=false
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            if [[ '${{ github.event.inputs.release }}' == 'true' ]]; then
              if [[ -z '${{ github.event.inputs.controller-version }}' ]]; then
                echo "Error: version input is required when release input is true for workflow_dispatch event" >&2
                exit 1
              fi
              PUSH=true
            fi
          fi
          echo "PUSH=${PUSH}" >> $GITHUB_OUTPUT
          echo "PUSH=${PUSH}" >> $GITHUB_ENV
          echo "PUSH=${PUSH}"

      - name: Check if it's a release build
        run: |
          if [[ '${{ env.PUSH }}' == 'true' ]]; then
            summary="This is a release build for version ${TAG}"
          else
            summary="This is not a release build. Images will be built but not pushed."
          fi
          echo "$summary"
          echo "$summary" >> $GITHUB_STEP_SUMMARY
      - name: Check if tag exists
        if: ${{ env.PUSH == 'true' }}
        run: |
          if git rev-parse "refs/tags/controller-${TAG}" >/dev/null 2>&1; then
            summary="Error: Github release tag controller-${TAG} already exists. This release build will fail to push images. Please delete the tag or choose a different version."
            echo "$summary"
            echo "$summary" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          # else
          #   echo "Tag controller-${TAG} does not exist. Proceeding with the release build."
          #   ### 🎋 Creating release branch release-${TAG}
          #   git config user.name "github-actions[bot]"
          #   git config user.email "github-actions[bot]@users.noreply.github.com"
          #   git checkout -b release-${TAG}
          #   git config pull.rebase false
          #   git pull origin ${ref_name}
          #   git push --set-upstream origin release-${TAG}
          #   ### Edit the semver tag
          #   echo "${TAG}" > TAG
          #   git add .
          #   git commit -m "release: Set controller image tag to ${TAG}" || true
          #   git push
          #   ### 🎋 Creating release tag
          #   git tag "controller-${TAG}"
          #   git push origin "controller-${TAG}"
          # fi

  build-controllers-images:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    needs: [changes, prepare]
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.controller == 'true')
    outputs:
      controller_digest: ${{ steps.set-digests.outputs.controller_digest }}
      controller_chroot_digest: ${{ steps.set-digests.outputs.controller_chroot_digest }}
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      PUSH: ${{ needs.prepare.outputs.push }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          # ref: ${{ case(needs.prepare.outputs.push == 'true', format('refs/tags/controller-{0}', needs.prepare.outputs.tag), github.ref) }}
      - name: Get go version
        run: echo "GOLANG_VERSION=$(cat GOLANG_VERSION)" >> $GITHUB_ENV

      - name: Set up Go
        id: go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          check-latest: true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: latest
          platforms: linux/amd64,linux/arm,linux/arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set make command
        run: |
          make_cmd=ci
          if [[ '${{ needs.prepare.outputs.push }}' == 'true' ]]; then
            make_cmd=release
          fi
          echo "MAKE_COMMAND=$make_cmd" >> $GITHUB_ENV
          echo "MAKE_COMMAND=$make_cmd"
      - name: build-images
        run: |
          make TAG=${{ needs.prepare.outputs.tag }} REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ingress-nginx ${MAKE_COMMAND}
      - name: Upload metadata
        if: ${{ needs.prepare.outputs.push == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-metadata
          path: '*-metadata.json'
      - name: Set output digests
        if: ${{ needs.prepare.outputs.push == 'true' }}
        id: set-digests
        run: |
          echo "controller_digest=$(jq -r '."containerimage.digest"' ingress-nginx-metadata.json)" >> $GITHUB_OUTPUT
          echo "controller_chroot_digest=$(jq -r '."containerimage.digest"' ingress-nginx-chroot-metadata.json)" >> $GITHUB_OUTPUT
      - name: Create release-${{ needs.prepare.outputs.tag }} branch
        if: ${{ needs.prepare.outputs.push == 'true' }}
        run: |
          ### 🎋 Creating release branch release-${TAG}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release-${TAG}
          git config pull.rebase false
          git pull origin ${{ github.ref_name }}
          git push --set-upstream origin release-${TAG}
          ### Edit the semver tag
          echo "${TAG}" > TAG
          git add .
          git commit -m "release: Set controller image tag to ${TAG}" || true
          git push
          ### 🎋 Creating controller-${TAG} release tag
          git tag "controller-${TAG}"
          git push origin "controller-${TAG}"

  release-helm-chart:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [prepare, build-controllers-images]
    if: ${{ needs.prepare.outputs.push == 'true' }}
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      PUSH: ${{ needs.prepare.outputs.push }}
      CONTROLLER_DIGEST: ${{ needs.build-controllers-images.outputs.controller_digest }}
      CONTROLLER_CHROOT_DIGEST: ${{ needs.build-controllers-images.outputs.controller_chroot_digest }}
      CHART_VERSION: ${{ github.event.inputs.chart-version }}
    steps:
      - name: Set up Helm Docs
        uses: gabe565/setup-helm-docs-action@d5c35bdc9133cfbea3b671acadf50a29029e87c2 # v1.0.4
      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v4.1.1
      - name: Setup kustomize
        uses: imranismail/setup-kustomize@53f941b41dca13ed61874bbc6b4b6e1562877530 # v3.0.0
        with:
            kustomize-version: 4.5.4
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          ref: release-${{ env.TAG }}
      - name: Prepare helm chart for release
        if: ${{ needs.prepare.outputs.push == 'true' }}
        run: |
          # Update the helm chart version and appVersion to match the image tag
          if [[ -n '${CHART_VERSION}' ]]; then
            yq eval -i '.version = "${{ env.CHART_VERSION }}"' charts/ingress-nginx/Chart.yaml
          fi
          yq eval -i '.appVersion = "${{ env.TAG }}"' charts/ingress-nginx/Chart.yaml
          # Update the helm chart values.yaml to use the image with the digest
          yq eval -i '.controller.image.digest = "${{ env.CONTROLLER_DIGEST }}" | .controller.image.digestChroot = "${{ env.CONTROLLER_CHROOT_DIGEST }}" | .controller.image.tag = "${{ env.TAG }}"' charts/ingress-nginx/values.yaml
          # Generate the README.md for chart
          helm-docs --chart-search-root charts
          # Edit the static manifests
          chmod +x hack/generate-deploy-scripts.sh
          hack/generate-deploy-scripts.sh
          # Add changes to git and push
          git add .
          git commit -m "release: Update helm chart version to ${CHART_VERSION}" || true
          git push
          ### 🎋 Creating helm-chart-${CHART_VERSION} release tag
          git tag "helm-chart-${CHART_VERSION}"
          git push origin "helm-chart-${CHART_VERSION}"
